<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Chatbot - Shayan Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    #chat-container {
      width: 350px;
      max-width: 90%;
      height: 500px;
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
      background: #fff;
    }

    #chat-header {
      background: #007bff;
      color: #fff;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      font-size: 1.1em;
    }

    #chat-box {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      padding: 8px 12px;
      border-radius: 12px;
      max-width: 80%;
      word-wrap: break-word;
    }

    .user {
      background: #007bff;
      color: #fff;
      align-self: flex-end;
    }

    .bot {
      background: #eee;
      color: #000;
      align-self: flex-start;
    }

    #input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    #input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    #send-btn {
      padding: 10px 15px;
      border: none;
      background: #007bff;
      color: white;
      cursor: pointer;
    }

    #send-btn:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

<div id="chat-container">
  <div id="chat-header">AI Assistant</div>
  <div id="chat-box"></div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Type your message..." />
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  const API_BASE = "https://white-label-ai-chatbot-generator-tyw4-h3t813bjf.vercel.app/api";
  const CHATBOT_ID = "54986926";
  const SECRET = "g8RWRsK-C93SlCSHJsoqA3aIvNa9bep8sstshXeR_J4";
  let sessionId = null;

  const chatBox = document.getElementById("chat-box");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");

  // Initialize session
  async function startSession() {
    try {
      const res = await fetch(`${API_BASE}/widget/open`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({chatbotId: CHATBOT_ID, integrationSecret: SECRET})
      });
      const data = await res.json();

      if (!data.ok) {
        alert("Failed to start chatbot session");
        return;
      }
      if (data.trialExpired) {
        alert("Trial expired. Please renew subscription.");
        return;
      }

      sessionId = data.sessionId;
      addMessage("bot", "Hi 👋 Welcome! How can I assist you today?");
    } catch (err) {
      console.error(err);
      addMessage("bot", "Error initializing chatbot.");
    }
  }

  // Send user message
  async function sendMessage() {
    const message = input.value.trim();
    if (!message || !sessionId) return;

    addMessage("user", message);
    input.value = "";

    try {
      const res = await fetch(`${API_BASE}/chatbot-test/message`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({sessionId: sessionId, message: message, tone: "professional"})
      });

      const data = await res.json();
      if (data.ok) {
        addMessage("bot", data.reply);
      } else {
        addMessage("bot", "Error: Unable to get reply.");
      }
    } catch (err) {
      console.error(err);
      addMessage("bot", "Server error, please try again.");
    }
  }

  // Add message to chat UI
  function addMessage(sender, text) {
    const msg = document.createElement("div");
    msg.classList.add("message", sender);
    msg.innerText = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // Event listeners
  sendBtn.addEventListener("click", sendMessage);
  input.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

  // Start chatbot on load
  startSession();
</script>

</body>
</html>
